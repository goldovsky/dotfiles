format = """\
${custom.startLine1}\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$line_break\
${custom.startLine2}\
${custom.userIcon}\
$time\
$container\
$cmd_duration\
$character\
"""

add_newline = true

palette = "cobalt2"

[directory]
style = "fg:light-grey bold"
read_only = " "
truncation_length = 10
format = '[$path$read_only]($style)'

[character]
success_symbol = "[](green bold)"
error_symbol = "[](red bold)" # 

[line_break]
disabled = false

[custom.startLine1]
when = "true"
style = "fg:blue"
symbol = "┏"
format = "[$symbol]($style) "

[custom.startLine2]
when = "true"
style = "fg:blue"
symbol = "┗"
format = "[$symbol]($style) "

[git_branch]
symbol = "⸎ "
format = " [$symbol](yellow) [$branch ](fg:yellow italic bold)"

[git_status]
untracked = "[ ](yellow)"
modified = "[ ](white)"
staged = "[ ](green)"
deleted = "[ ](red)" #  
ahead = "[  ](green)"
behind = "[  ](orange)"
diverged = "[󰦻 ](cyan)"
conflicted = "[  ](red)"
stashed = "[   ](yellow)"
typechanged = ""
renamed = "[ 󰣕 ](white)"
up_to_date = ""
format = """
$stashed\
$conflicted\
$ahead_behind\
$deleted\
$modified\
$staged\
$untracked\
$renamed\
$typechanged\
"""

[time]
disabled = true
time_format = "%R"
style = "fg:white bg:user-cell"
format = ' [$time]($style)'

# 󰄉
[cmd_duration]
format = " [󰫃 ~[$duration](fg:white italic)](italic)"

[container]
disabled = false
style = "fg:docker-blue"
format = "[ ]($style)"

