palette = "cobalt2"

[time]
disabled = true
time_format = "%R"
style = "fg:white bg:user-cell"
format = ' [$time]($style)'

[username]
disabled = true
format = " [ůįęīůįęľůįęĻůįęĪůįęľůį¨Éůį¨Äůįęłůį¨Ü](fg:white bold)"
show_always = true

[custom.startLine1Git]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "fg:blue"
symbol = "‚ĒŹ"
format = "[$symbol]($style) "

[custom.startLine2Git]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "fg:blue"
symbol = "‚Ēó"
format = "\n[$symbol]($style) "

[custom.gitFolder]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "fg:blue"
symbol = "ÔďĒ "
format = "[$symbol]($style)"

[custom.startLine1NotGit]
when = "! git rev-parse --is-inside-work-tree >/dev/null 2>&1"
