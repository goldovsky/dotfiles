format = """\
${custom.startLine1}\
${custom.giticon}\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$fill\
$cmd_duration\
$nodejs\
$line_break\
${custom.startLine2}\
${custom.userIcon}\
$time\
$container\
$character\
"""

add_newline = true

palette = "cobalt2"

[custom.giticon]
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
style = "fg:orange"
# symbol = "¾░Ŗó "
# symbol = "’ćō "
symbol = "’Éł "
format = "[$symbol]($style) "
require_repo = true
ignore_timeout = true

[directory]
style = "fg:light-grey bold"
read_only = " Ņéó"
truncation_length = 10
format = '[$path$read_only]($style)'

[fill]
symbol = " "

[nodejs]
symbol = "Ņ£ś"
version_format = "${major}.${minor}"
format = "[ $symbol( $version) ]($style)"

[character]
success_symbol = "[’üö](green bold)"
error_symbol = "[’üö](red bold)" # 

[line_break]
disabled = false

[custom.startLine1]
when = "true"
style = "fg:grey"
symbol = "ŌöÅ"
format = "[$symbol]($style) "

[custom.startLine2]
when = "true"
style = "fg:grey"
symbol = "ŌöŚ"
