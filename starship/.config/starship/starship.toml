format = """\
${custom.startLine1}\
$directory\
$fill\
$cmd_duration\
$nodejs\
${custom.gitlinestart}\
${custom.giticon}\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$line_break\
${custom.startLine2}\
${custom.userIcon}\
$time\
$container\
$character\
"""

add_newline = true

palette = "cobalt2"

[custom.gitlinestart]
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
style = "fg:grey"
# symbol = "󰊢 "
# symbol = " "
symbol = "\n| "
format = "[$symbol]($style)"


[custom.giticon]
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
style = "fg:orange"
# symbol = "󰊢 "
# symbol = " "
symbol = " "
format = "[$symbol]($style) "
require_repo = true
ignore_timeout = true

[directory]
style = "fg:light-grey bold"
read_only = " "
truncation_length = 10
format = '[$path$read_only]($style)'

[fill]
symbol = " "

[nodejs]
symbol = ""
version_format = "${major}.${minor}"
format = "[ $symbol( $version) ]($style)"

[character]
success_symbol = "[](green bold)"
error_symbol = "[](red bold)" # 

[line_break]
disabled = false

[custom.startLine1]
when = "true"
style = "fg:grey"
symbol = "┏"
format = "[$symbol]($style) "

[custom.startLine2]
when = "true"
style = "fg:grey"
symbol = "┗"
format = "[$symbol]($style) "

[git_branch]
# symbol = "⸎ "
# format = " [$symbol](yellow) [$branch ](fg:yellow italic bold)"
symbol = "[](grey) "
style = "fg:cyan bg:grey"
format =  "[on](white) [$symbol$branch]($style bold italic)[](grey) "

[git_status]
staged = "[ ](green)"
modified = "[ ](white)"
renamed = "[ 󰣕 ](white)"
deleted = "[ ](red)" #  
untracked = "[ ](yellow)"
stashed = "[   ](yellow)"
conflicted = "[  ](red)"

ahead = "[  ](green)"
behind = "[  ](orange)"
diverged = "[󰦻 ](cyan)"
typechanged = ""
up_to_date = ""
format = """
$stashed\
$conflicted\
$ahead_behind\
$modified\
$staged\
$untracked\
$renamed\
$deleted\
$typechanged\
"""

[time]
disabled = true
time_format = "%R"
style = "fg:white bg:user-cell"
format = ' [$time]($style)'

# 󰄉  󰫃
[cmd_duration]
format = "[󰄉 ~[$duration](fg:white italic)](italic) "

[container]
disabled = false
style = "fg:docker-blue"
format = "[ ]($style)"

