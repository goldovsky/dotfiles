format = """\
${custom.startLine1}\
${custom.git_directory}${custom.normal_directory}\
$git_state\
$git_status\
$git_metrics\
$fill\
$cmd_duration\
$nodejs\
${custom.git_branch_name}${custom.git_branch_ticket}${custom.git_branch_icon}\
$line_break\
${custom.startLine2}\
${custom.userIcon}\
$time\
$container\
$character\
"""

add_newline = true

palette = "cobalt2"

# [directory]
# style = "fg:#FFFFFF bold"
# read_only = " "
# truncation_length = 10
# format = '[$path$read_only]($style) '

[custom.git_directory]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
command = '''
repo_root=$(git rev-parse --show-toplevel 2>/dev/null)
repo=$(basename "$repo_root")
rel=$(echo "$PWD" | sed "s|$repo_root||")
if [ -n "$rel" ]; then
  out="$repo$rel"
else
  out="$repo"
fi
[ ! -w "$PWD" ] && out="$out "
echo "$out"
'''
symbol = "⸎ "
style = "fg:yellow bold"
format = "[$symbol $output]($style) "

[custom.normal_directory]
when = "! git rev-parse --is-inside-work-tree >/dev/null 2>&1"
command = '''
dir=$(echo "$PWD" | sed "s|$HOME|~|")
count=$(echo "$dir" | tr "/" "\n" | grep -c .)
if [ "$count" -le 10 ]; then
  out="$dir"
else
  out=$(echo "$dir" | rev | cut -d/ -f1-10 | rev | sed "s|^|…/|")
fi
[ ! -w "$PWD" ] && out="$out "
echo "$out"
'''
style = "fg:light-grey bold"
format = "[$output]($style) "

[fill]
symbol = " "

[nodejs]
# style = "fg:yellow bold"
# symbol = ""
# symbol = "󰫈"
symbol = ""
version_format = "${major}.${minor}"
format = "[$symbol( $version) ]($style bold dimmed)"

[character]
success_symbol = "[](green bold)"
error_symbol = "[](red bold)"

[line_break]
disabled = false

[custom.startLine1]
when = "true"
style = "fg:grey"
symbol = "┏"
format = "[$symbol]($style) "

[custom.startLine2]
when = "true"
style = "fg:grey"
symbol = "┗"
format = "[$symbol]($style) "

# [git_branch]
# # symbol = "󰊢 "
# # symbol = " "
# symbol = " "
# # symbol = "⸎ "
# style = "fg:cyan bg:grey"
# format = "[](grey)[$branch]($style bold italic)[ $symbol](fg:red bg:grey)[](grey)"

[custom.git_branch_name]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
command = '''
b=$(git rev-parse --abbrev-ref HEAD 2>/dev/null) && \
if [[ "$b" =~ ^(fix|feature|refacto)/?RCMTORCH-([0-9]+)/(.+)$ ]]; then
  p="${BASH_REMATCH[1]}"
  t="${BASH_REMATCH[3]}"
  if [[ -z "$p" || "$p" == "feature" ]]; then
    echo "$t"
  else
    echo "$p $t"
  fi
else
  echo "$b"
fi
'''
style = "fg:cyan bg:grey"
format = "[](grey)[$output]($style bold italic)"

[custom.git_branch_ticket]
when = '''
git rev-parse --is-inside-work-tree >/dev/null 2>&1 && \
[[ $(git rev-parse --abbrev-ref HEAD 2>/dev/null) =~ ^(fix|feature|refacto)/?RCMTORCH-[0-9]+/(.+)$ ]]
'''
command = '''
b=$(git rev-parse --abbrev-ref HEAD 2>/dev/null) && \
if [[ "$b" =~ ^(fix|feature|refacto)/?RCMTORCH-([0-9]+)/(.+)$ ]]; then
  echo " ${BASH_REMATCH[2]}"
fi
'''
format = "[ $output](fg:yellow bg:grey bold)[](grey)"

[custom.git_branch_icon]
when = '''
git rev-parse --is-inside-work-tree >/dev/null 2>&1 && \
! [[ $(git rev-parse --abbrev-ref HEAD 2>/dev/null) =~ ^(fix|feature|refacto)/?RCMTORCH-[0-9]+/(.+)$ ]]
'''
command = "true"
symbol = "  "
format = "[$symbol](fg:red bg:grey)[](grey)"

[git_status]
staged = "[ ](green)"
modified = "[ ](white)"
renamed = "[ 󰣕 ](white)"
deleted = "[ ](red)"
untracked = "[ ](yellow)"
stashed = "[   ](yellow)"
conflicted = "[  ](red)"

ahead = "[  ](green)"
behind = "[  ](orange)"
diverged = "[󰦻 ](cyan)"
typechanged = ""
up_to_date = ""
format = """
$stashed\
$conflicted\
$ahead_behind\
$modified\
$staged\
$untracked\
$renamed\
$deleted\
$typechanged\
"""

[time]
disabled = true
time_format = "%R"
style = "fg:white bg:user-cell bold"
format = '[$time]($style)'

[cmd_duration]
format = "[󰄉 ~[$duration](fg:white italic)](italic) "

[container]
disabled = false
style = "fg:#0db7ed"
format = "[ ]($style) "

