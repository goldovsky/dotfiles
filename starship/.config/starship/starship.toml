format = """\
${custom.startLine1Git}\
${custom.startLine1NotGit}\
${custom.gitFolder}\
${custom.notGitFolder}\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
${custom.startLine2Git}\
${custom.startLine2NotGit}\
${custom.userIcon}\
$username\
$time\
$container\
$cmd_duration\
$character\
"""

palette = "goldovsky"

[time]
disabled = true
time_format = "%R"
style = "fg:white bg:user-cell"
format = ' [$time]($style)'

[username]
disabled = true
format = " [󰫴󰫼󰫹󰫱󰫼󰬃󰬀󰫸󰬆](fg:white bold)"
show_always = true

[custom.startLine1Git]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "fg:gold-yellow"
symbol = "𜸬"
format = "[$symbol]($style) "

[custom.startLine2Git]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "fg:gold-yellow"
symbol = "𜸫"
format = "\n[$symbol]($style) "

[custom.startLine1NotGit]
when = "! git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "fg:olive-green"
symbol = "𜸬"
format = "[$symbol]($style) "

[custom.startLine2NotGit]
when = "! git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "fg:olive-green"
symbol = "𜸫"
format = "\n[$symbol]($style) "

[custom.userIcon]
when = "true"
style = "fg:gold-yellow"
# symbol = "ゴルド–さん"
# symbol = "「ゴルド–さん」"
symbol = " "
# symbol = "󰼁 "
# symbol = " "
# symbol = " "
# symbol = "󰇥 "
format = "[$symbol]($style)"

[custom.gitFolder]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "fg:olive-green"
symbol = " "
format = "[$symbol]($style)"

[custom.notGitFolder]
when = "! git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = "[ ](white)"

[directory]
style = "fg:white bold"
read_only = " "
truncation_length = 10
format = '[ $path$read_only]($style)'

# 󰄉
[cmd_duration]
format = " [󰫃 ~[$duration](fg:white italic)](italic)"

[git_branch]
symbol = "⸎ "
format = " [$symbol](gold-yellow) [$branch ](fg:gold-yellow italic bold)"

[git_status]
untracked = "[ ](yellow)"
modified = "[ ](white)"
staged = "[ ](green)"
deleted = "[ ](red)" #  
ahead = "[ ](yellow)"
behind = "[ ](yellow)"
diverged = "[󰦻 ](cyan)"
conflicted = "[  ](red)"
stashed = "[   ](yellow)"
typechanged = ""
renamed = "[󰣕 ](white)"
up_to_date = ""
format = """
$stashed\
$conflicted\
$deleted\
$modified\
$staged\
$untracked\
$renamed\
$ahead_behind\
$typechanged\
"""
[container]
disabled = false
style = "fg:docker-blue"
format = "[ ]($style)"

[character]
success_symbol = "[ ❱](olive-green bold)[❱](white bold)[❱](gold-yellow bold)"
error_symbol = "[ ❱](red bold)[❱](red bold)[❱](red bold)" # ⪤ 

# ------------------------------------#
# AUTO-GENERATED by generate-colors.sh - do not edit manually
# Source: goldovsky.json

[palettes.goldovsky]
# Cells: background / mid / foreground
dark-cell   = '#5A5950'
medium-cell = '#8A897E'
light-cell  = '#E8E7DE'
# Neutrals
black       = '#4A4942'
light-black = '#6A6962'
dark-grey   = '#5A5950'
grey        = '#8A897E'
light-grey  = '#E8E7DE'
white       = '#F5F4EB'
# Semantic colors
red    = '#E05545'
green  = '#7A8A3F'
blue   = '#5A9A9C'
yellow = '#EFBF04'
orange = '#FF7565'
purple = '#AA6A90'
cyan   = '#5A9A7D'
# Accent colors
olive-green = '#636B2F'
gold-yellow = '#EFBF04'
