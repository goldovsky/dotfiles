[palettes.cobalt2]
# Cells: background / mid / foreground
dark-cell   = '#0A1A27'
medium-cell = '#1A3A52'
light-cell  = '#FFFFFF'
# Neutrals
black       = '#000000'
light-black = '#545454'
dark-grey   = '#0A1A27'
grey        = '#1A3A52'
light-grey  = '#FFFFFF'
white       = '#BBBBBB'
# Semantic colors
red    = '#FF0000'
green  = '#37DD21'
blue   = '#1460D2'
yellow = '#FEE409'
orange = '#F40D17'
purple = '#FF005D'
cyan   = '#00BBBB'
