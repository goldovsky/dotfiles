# ------------------------------------#

[palettes.material]
# Cells: background / mid / foreground
dark-cell   = "#1e282d"   # Material primary background
medium-cell = "#7dc6bf"   # Material bright.blue (brighter mid tone)
light-cell  = "#c4c7d1"   # Material foreground
# Neutrals
black       = "#ff262b"   # bright.black (from Material bright set)
light-black = "#c4c7d1"   # foreground
dark-grey   = "#35434d"   # bright.cyan (darker/contrast)
grey        = "#666666"   # normal.black / neutral
light-grey  = "#c4c7d1"   # foreground
white       = "#ffffff"   # bright.white
# Semantic colors (using Material bright / normal where appropriate)
red    = "#fb4934"   # red (normal/bright)
green  = "#c3e88d"   # green
blue   = "#7dc6bf"   # bright.blue
yellow = "#f7eb95"   # yellow
orange = "#ffb86c"   # derived warm accent (not in Material set)
purple = "#6c71c4"   # bright.magenta
cyan   = "#35434d"   # bright.cyan
olive-green = "#636B2F"
gold-yellow = "#EFBF04"
docker-blue = "#0db7ed"
