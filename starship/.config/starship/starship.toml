format = """\
${custom.startLine1Git}\
${custom.startLine1NotGit}\
${custom.gitFolder}\
${custom.notGitFolder}\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
${custom.startLine2Git}\
${custom.startLine2NotGit}\
${custom.userIcon}\
$username\
$time\
$container\
$cmd_duration\
$character\
"""

palette = "material"

[time]
disabled = true
time_format = "%R"
style = "fg:white bg:user-cell"
format = ' [$time]($style)'

[username]
disabled = true
format = " [у°«ґу°«ју°«№у°«±у°«ју°¬ѓу°¬Ђу°«ёу°¬†](fg:white bold)"
show_always = true

[custom.startLine1Git]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "fg:gold-yellow"
symbol = "рњё¬"
format = "[$symbol]($style) "

[custom.startLine2Git]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "fg:gold-yellow"
symbol = "рњё«"
format = "\n[$symbol]($style) "

[custom.startLine1NotGit]
when = "! git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "fg:olive-green"
symbol = "рњё¬"
format = "[$symbol]($style) "

[custom.startLine2NotGit]
when = "! git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "fg:olive-green"
symbol = "рњё«"
format = "\n[$symbol]($style) "

[custom.userIcon]
when = "true"
style = "fg:gold-yellow"
# symbol = "г‚ґгѓ«гѓ‰вЂ“гЃ•г‚“"
# symbol = "гЂЊг‚ґгѓ«гѓ‰вЂ“гЃ•г‚“гЂЌ"
symbol = "п‡Ћ "
# symbol = "у°јЃ "
# symbol = "п‚” "
# symbol = "о·… "
# symbol = "у°‡Ґ "
format = "[$symbol]($style)"

[custom.gitFolder]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "fg:olive-green"
symbol = "п“” "
format = "[$symbol]($style)"

[custom.notGitFolder]
when = "! git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = "[п“” ](white)"

[directory]
style = "fg:white bold"
read_only = " о‚ў"
truncation_length = 10
format = '[ $path$read_only]($style)'

#В у°„‰
[cmd_duration]
format = " [у°«ѓ ~[$duration](fg:white italic)](italic)"

[git_branch]
symbol = "вёЋ "
format = " [$symbol](gold-yellow) [$branch ](fg:gold-yellow italic bold)"

[git_status]
untracked = "[п“ѓ ](yellow)"
modified = "[п‘„ ](white)"
staged = "[п‘„ ](green)"
deleted = "[п‘§ ](red)" # п‘„ п‘§
ahead = "[пЃ· ](yellow)"
behind = "[пЃё ](yellow)"
diverged = "[у°¦» ](cyan)"
conflicted = "[ о™” ](red)"
stashed = "[ о¶•  ](yellow)"
typechanged = ""
renamed = "[у°Ј• ](white)"
up_to_date = ""
format = """
$stashed\
$conflicted\
$deleted\
$modified\
$staged\
$untracked\
$renamed\
$ahead_behind\
$typechanged\
"""
[container]
disabled = false
style = "fg:docker-blue"
format = "[пЊ€ ]($style)"

[character]
success_symbol = "[ вќ±](olive-green bold)[вќ±](white bold)[вќ±](gold-yellow bold)"
