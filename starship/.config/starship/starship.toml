format = """\
${custom.startLine1}\
$directory\
$fill\
$cmd_duration\
$nodejs\
${custom.gitlinestart}\
${custom.giticon}\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$line_break\
${custom.startLine2}\
${custom.userIcon}\
$time\
$container\
$character\
"""

add_newline = true

palette = "cobalt2"

[custom.gitlinestart]
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
style = "fg:grey"
symbol = "\n| "
format = "[$symbol]($style)"


[custom.giticon]
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
style = "fg:orange"
# symbol = "¾░Ŗó "
# symbol = "’ćō "
symbol = "’Éł "
# symbol = "ŌĖÄ "
format = "[$symbol]($style) [on](white) "
require_repo = true
ignore_timeout = true

[directory]
style = "fg:light-grey bold"
read_only = " Ņéó"
truncation_length = 10
format = '[$path$read_only]($style)'

[fill]
symbol = " "

[nodejs]
# symbol = "Ņ£ś"
symbol = "¾░½ł"
version_format = "${major}.${minor}"
format = "[ $symbol( $version) ]($style)"

[character]
success_symbol = "[’üö](green bold)"
error_symbol = "[’üö](red bold)"

[line_break]
disabled = false

[custom.startLine1]
when = "true"
style = "fg:grey"
symbol = "ŌöÅ"
format = "[$symbol]($style) "

[custom.startLine2]
when = "true"
style = "fg:grey"
symbol = "ŌöŚ"
format = "[$symbol]($style) "

[git_branch]
symbol = "[ŅéČ](grey)’Éś "
style = "fg:cyan bg:grey"
format =  "[$symbol$branch]($style bold italic)[Ņé┤](grey) "

[git_status]
staged = "[’æä ](green)"
modified = "[’æä ](white)"
renamed = "[ ¾░ŻĢ ](white)"
deleted = "[’æ¦ ](red)"
untracked = "[’ōā ](yellow)"
stashed = "[ ŅČĢ  ](yellow)"
conflicted = "[ ŅÖö ](red)"

ahead = "[’üĘ  ](green)"
behind = "[’üĖ  ](orange)"
diverged = "[¾░”╗ ](cyan)"
typechanged = ""
up_to_date = ""
format = """
$stashed\
$conflicted\
$ahead_behind\
$modified\
$staged\
$untracked\
$renamed\
$deleted\
$typechanged\
"""

[time]
disabled = true
time_format = "%R"
style = "fg:white bg:user-cell bold"
