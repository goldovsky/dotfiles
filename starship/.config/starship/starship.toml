format = """\
${custom.startLine1}\
$directory\
$git_state\
$git_status\
$git_metrics\
$fill\
$cmd_duration\
$nodejs\
${custom.git_branch}\
$line_break\
${custom.startLine2}\
${custom.userIcon}\
$time\
$container\
$character\
"""

add_newline = true

palette = "cobalt2"

[directory]
style = "fg:light-grey bold"
read_only = " Ņéó"
truncation_length = 10
format = '[$path$read_only]($style) '

[fill]
symbol = " "

[nodejs]
# symbol = "Ņ£ś"
# symbol = "¾░½ł"
symbol = ""
version_format = "${major}.${minor}"
format = "[$symbol( $version) ]($style bold dimmed)"

[character]
success_symbol = "[’üö](green bold)"
error_symbol = "[’üö](red bold)"

[line_break]
disabled = false

[custom.startLine1]
when = "true"
style = "fg:grey"
symbol = "ŌöÅ"
format = "[$symbol]($style) "

[custom.startLine2]
when = "true"
style = "fg:grey"
symbol = "ŌöŚ"
format = "[$symbol]($style) "

# [git_branch]
# # symbol = "¾░Ŗó "
# # symbol = "’ćō "
# symbol = "’Éł "
# # symbol = "ŌĖÄ "
# style = "fg:cyan bg:grey"
# format = "[ŅéČ](grey)[$branch]($style bold italic)[ $symbol](fg:red bg:grey)[Ņé┤](grey)"

[custom.git_branch]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
command = "b=$(git rev-parse --abbrev-ref HEAD 2>/dev/null) && if [[ \"$b\" =~ ^(fix|feature|refacto)/?RCMTORCH-([0-9]{4})/(.+)$ ]]; then p=\"${BASH_REMATCH[1]}\"; n=\"${BASH_REMATCH[2]}\"; t=\"${BASH_REMATCH[3]}\"; if [[ -z \"$p\" || \"$p\" == \"feature\" ]]; then echo \"N┬░$n $t\"; else echo \"$p N┬░$n $t\"; fi; else echo \"$b\"; fi"
style = "fg:cyan bg:grey"
format = "[ŅéČ](grey)[$output]($style bold italic)[ ’Éł ](fg:red bg:grey)[Ņé┤](grey)"

[git_status]
staged = "[’æä ](green)"
modified = "[’æä ](white)"
renamed = "[ ¾░ŻĢ ](white)"
deleted = "[’æ¦ ](red)"
untracked = "[’ōā ](yellow)"
stashed = "[ ŅČĢ  ](yellow)"
conflicted = "[ ŅÖö ](red)"

ahead = "[’üĘ  ](green)"
behind = "[’üĖ  ](orange)"
diverged = "[¾░”╗ ](cyan)"
typechanged = ""
up_to_date = ""
format = """
$stashed\
$conflicted\
$ahead_behind\
$modified\
$staged\
$untracked\
$renamed\
$deleted\
$typechanged\
"""

[time]
disabled = true
time_format = "%R"
style = "fg:white bg:user-cell bold"
format = '[$time]($style)'

[cmd_duration]
format = "[¾░äē ~[$duration](fg:white italic)](italic) "

[container]
disabled = false
style = "fg:#0db7ed"
format = "[’īł ]($style) "

