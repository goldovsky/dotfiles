format = """\
${custom.startLine1Git}\
${custom.startLine1NotGit}\
${custom.gitFolder}\
${custom.notGitFolder}\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
${custom.startLine2Git}\
${custom.startLine2NotGit}\
${custom.userIcon}\
$username\
$time\
$container\
$cmd_duration\
$character\
"""

palette = "goldovsky"

[time]
disabled = true
time_format = "%R"
style = "fg:white bg:user-cell"
format = ' [$time]($style)'

[username]
disabled = true
format = " [󰫴󰫼󰫹󰫱󰫼󰬃󰬀󰫸󰬆](fg:white bold)"
show_always = true

[custom.startLine1Git]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "fg:gold-yellow"
symbol = "𜸬"
format = "[$symbol]($style) "

[custom.startLine2Git]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "fg:gold-yellow"
symbol = "𜸫"
format = "\n[$symbol]($style) "

[custom.startLine1NotGit]
when = "! git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "fg:olive-green"
symbol = "𜸬"
format = "[$symbol]($style) "

[custom.startLine2NotGit]
when = "! git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "fg:olive-green"
symbol = "𜸫"
format = "\n[$symbol]($style) "

[custom.userIcon]
when = "true"
style = "fg:gold-yellow"
# symbol = "ゴルド–さん"
# symbol = "「ゴルド–さん」"
symbol = " "
# symbol = "󰼁 "
# symbol = " "
# symbol = " "
# symbol = "󰇥 "
format = "[$symbol]($style)"

[custom.gitFolder]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "fg:olive-green"
symbol = " "
format = "[$symbol]($style)"

[custom.notGitFolder]
when = "! git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = "[ ](white)"

[directory]
style = "fg:white bold"
read_only = " "
truncation_length = 10
format = '[ $path$read_only]($style)'

# 󰄉
[cmd_duration]
format = " [󰫃 ~[$duration](fg:white italic)](italic)"

[git_branch]
symbol = "⸎ "
format = " [$symbol](gold-yellow) [$branch ](fg:gold-yellow italic bold)"

[git_status]
untracked = "[ ](yellow)"
modified = "[ ](white)"
staged = "[ ](green)"
deleted = "[ ](red)" #  
ahead = "[ ](yellow)"
behind = "[ ](yellow)"
diverged = "[󰦻 ](cyan)"
conflicted = "[  ](red)"
stashed = "[   ](yellow)"
typechanged = ""
renamed = "[󰣕 ](white)"
up_to_date = ""
format = """
$stashed\
$conflicted\
$deleted\
$modified\
$staged\
$untracked\
$renamed\
$ahead_behind\
$typechanged\
"""
[container]
disabled = false
style = "fg:docker-blue"
format = "[ ]($style)"

[character]
success_symbol = "[ ❱](olive-green bold)[❱](white bold)[❱](gold-yellow bold)"
error_symbol = "[ ❱](red bold)[❱](red bold)[❱](red bold)" # ⪤ 

# ------------------------------------#

[palettes.goldovsky]
# Cells: background / mid / foreground
dark-cell   = "#181B20"   # Goldovsky background
medium-cell = "#6B9EA0"   # muted teal (mid tone)
light-cell  = "#F2F0EF"   # warm white foreground
# Neutrals
black       = "#4C4C4C"   # neutral grey
light-black = "#6E6E6E"   # lighter grey (comments/dim)
dark-grey   = "#4C4C4C"   # dark neutral
grey        = "#6E6E6E"   # mid grey
light-grey  = "#F2F0EF"   # warm white
white       = "#FFFFFF"   # pure white
# Semantic colors
red    = "#fb4934"   # warm red accent
green  = "#A9B665"   # brightened olive
blue   = "#6B9EA0"   # muted warm teal
yellow = "#F5D76E"   # soft gold (for status indicators)
orange = "#F28534"   # warm orange
purple = "#C07AAF"   # warm mauve
cyan   = "#7BA88D"   # sage/seafoam
# Accent colors
olive-green = "#636B2F"
gold-yellow = "#EFBF04"
docker-blue = "#0db7ed"
