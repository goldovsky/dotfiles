purple = "#6c71c4"   # bright.magenta
cyan   = "#35434d"   # bright.cyan
olive-green = "#636B2F"
gold-yellow = "#EFBF04"


# Unicode Pair Ideas
# - Corners / Brackets
# - Ôî£ ÔîŞ ÔÇö light top-left / bottom-left corner (clean, typographic)
# - ÔşĞ Ôşğ ÔÇö double square brackets (modern, compact)
# - ÔØ┤ ÔØÁ ÔÇö ornamental curly braces (decorative)
# - ÒÇê ÒÇë ÔÇö angle brackets (minimal, elegant)
# - ÒÇî ÒÇı ÔÇö East Asian corner quotes (strong visual bind)
# - Box / Line Corners
# - Ôöî Ôöö ÔÇö single-line box corners (classic terminal look)
# - Ôò¡ Ôò░ ÔÇö rounded box corners (softer)
# - ÔöÅ Ôöù ÔÇö heavy/top-heavy corners (bold)
# - Ôûø ÔûÖ ÔÇö blocky, high-contrast corners (graphic)
# - Arrows / Chevrons
# - ┬½ ┬╗ ÔÇö guillemets (rail-binding feel)
# - ÔÇ╣ ÔÇ║ ÔÇö single guillemets (subtle)
# - ÔşÁ ÔşÂ ÔÇö long arrows (directional, modern)
# - Ôåñ ÔåĞ ÔÇö left/right hooks (technical, distinctive)
# - Ôş¿ Ôş® ÔÇö angle pickets (mathematical / tidy)
# - Decorative / Flourish
# - ÔØĞ ÔØğ ÔÇö floral ornaments (elegant, decorative)
# - Ô£Ğ Ô£ğ ÔÇö star-like (sparkle / accent)
# - ÔİÖ ÔİÖ ÔÇö pilcrow-like flourish (symmetrical)
# - ÔØ▓ ÔØ│ ÔÇö thin ornamental brackets
# - ´╣ø ´╣£ ÔÇö small curly forms (compact curly)
