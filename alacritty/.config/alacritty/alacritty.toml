[general]
import = [
  #  "~/git/dotfiles/alacritty/.config/alacritty/themes/ayu_dark.toml"
  # "~/git/dotfiles/alacritty/.config/alacritty/themes/gruvbox_dark.toml"
  # "~/git/dotfiles/alacritty/.config/alacritty/themes/material_theme.toml"
  "~/git/dotfiles/shell/common/themes/outputs/alacritty-theme.toml"
]

[terminal]
shell = { program = "/bin/bash", args = ["-l"] }

[window]
# padding = { x = 35, y = 15 }
padding = { x = 15, y = 0 }
dimensions = { columns = 120, lines = 30 }
dynamic_padding = true
title = "Alacritty"
decorations = "None"
blur = true
opacity = 1
startup_mode = "Maximized"

[font]
size = 15
[font.normal]
family = "ZedMono Nerd Font"
# family = "Iosevka Nerd Font"
# family = "Hack Nerd Font"
style = "Regular"

[cursor]
[cursor.style]
shape = "Underline"
blinking = "On"

[mouse]
hide_when_typing = true
